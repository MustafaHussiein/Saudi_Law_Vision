<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legal Tech Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: #f8f9fa; }
        .sidebar { position: fixed; right: 0; top: 0; height: 100vh; width: 280px; 
                   background: linear-gradient(180deg, #1e3a8a 0%, #1e40af 100%); 
                   color: white; overflow-y: auto; z-index: 40; }
        .main-content { margin-right: 280px; padding: 2rem; min-height: 100vh; }
        .nav-item { display: flex; align-items: center; padding: 0.75rem 1.5rem; 
                    color: rgba(255,255,255,0.8); transition: all 0.2s; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { border-right: 4px solid #60a5fa; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <script>
        const token = localStorage.getItem('access_token');
        const currentPath = window.location.pathname;
        const publicPages = ['/login', '/register', '/'];
        if (!token && !publicPages.includes(currentPath)) {
            window.location.href = '/login';
        }
    </script>

    <aside class="sidebar">
        <a href="/dashboard" class="block p-6 border-b border-blue-800 hover:bg-blue-800 transition">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
                    <span class="text-blue-900 font-bold text-xl">R</span>
                </div>
                <div>
                    <h2 class="text-lg font-bold">Riada Law</h2>
                    <p class="text-xs text-blue-200">Legal Tech MVP</p>
                </div>
            </div>
        </a>
        
        <nav class="py-4">
            <!-- Dashboard - everyone sees -->
            <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span>لوحة التحكم</span>
            </a>

            <!-- AI Assistant - everyone sees -->
            <a href="/assistant" class="nav-item {% if active_page == 'assistant' %}active{% endif %}">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                </svg>
                <span>المساعد الذكي</span>
            </a>
            
            <!-- Tickets - everyone sees -->
            <a href="/tickets" class="nav-item {% if active_page == 'tickets' %}active{% endif %}">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                </svg>
                <span>التذاكر والطلبات</span>
            </a>
            
            <!-- Notifications -->
            <a href="/notifications" class="nav-item {% if active_page == 'notifications' %}active{% endif %}">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span>الإشعارات</span>
            </a>

            <!-- Documents -->
            <a href="/documents" class="nav-item {% if active_page == 'documents' %}active{% endif %}">
                <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span>المستندات</span>
            </a>
            
            <!-- STAFF ONLY - Hidden for clients -->
            <div id="staff-only" style="display:none;">
                <a href="/clients" class="nav-item {% if active_page == 'clients' %}active{% endif %}">
                    <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span>إدارة العملاء</span>
                </a>

                <a href="/users" class="nav-item {% if active_page == 'users' %}active{% endif %}" id="users-nav" style="display:none;">
                    <svg class="w-5 h-5 ml-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>إدارة المستخدمين</span>
                </a>
            </div>
        </nav>
        
        <div class="absolute bottom-0 right-0 left-0 p-4 border-t border-blue-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-300 flex items-center justify-center">
                    <span class="text-blue-900 font-bold" id="user-initial">U</span>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-sm" id="user-name">Loading...</p>
                    <p class="text-xs text-blue-200" id="user-role">-</p>
                </div>
                <button onclick="logout()" class="text-blue-200 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </aside>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }

        async function loadUserProfile() {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            
            try {
                const response = await fetch('/api/v1/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('user-initial').textContent = 
                        (user.full_name || user.email || 'U')[0].toUpperCase();
                    document.getElementById('user-name').textContent = 
                        user.full_name || user.email || 'User';
                    document.getElementById('user-role').textContent = user.role || 'user';
                    
                    // Show staff-only sections if not client
                    if (user.role !== 'client') {
                        document.getElementById('staff-only').style.display = 'block';
                        if (user.is_superuser) {
                            document.getElementById('users-nav').style.display = 'flex';
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        if (localStorage.getItem('access_token')) {
            loadUserProfile();
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
