<!-- Modal Component -->
<div id="{{ modal_id or 'modal' }}" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
<div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
<div class="p-6 border-b border-gray-200">
<div class="flex items-center justify-between">
<h3 class="text-xl font-semibold text-gray-900">{{ title }}</h3>
<button onclick="closeModal('{{ modal_id or 'modal' }}')" class="text-gray-400 hover:text-gray-600">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
</svg>
</button>
</div>
</div>
<div class="p-6">
{{ content | safe }}
</div>
{% if show_actions %}
<div class="p-6 border-t border-gray-200 flex gap-3 justify-end">
<button onclick="closeModal('{{ modal_id or 'modal' }}')" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
إلغاء
</button>
<button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
تأكيد
</button>
</div>
{% endif %}
</div>
</div>
<script>
function showModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
</script>
