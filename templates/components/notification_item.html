<!-- Notification Item Component -->
<div class="p-4 border-b border-gray-200 hover:bg-gray-50 cursor-pointer {% if not notification.is_read %}bg-blue-50{% endif %}">
<div class="flex items-start gap-3">
<div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
</svg>
</div>
<div class="flex-1">
<p class="font-medium text-gray-900">{{ notification.title }}</p>
<p class="text-sm text-gray-600 mt-1">{{ notification.message[:100] }}...</p>
<p class="text-xs text-gray-500 mt-2">{{ notification.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
</div>
{% if not notification.is_read %}
<span class="w-2 h-2 bg-blue-600 rounded-full"></span>
{% endif %}
</div>
</div>
