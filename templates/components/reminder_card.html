<!-- Reminder Card Component -->
<div class="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition border-r-4 {{ 'border-red-500' if reminder.priority.value == 'urgent' else 'border-blue-500' }}">
<div class="flex items-start justify-between mb-3">
<h3 class="text-lg font-semibold text-gray-900">{{ reminder.title }}</h3>
<span class="px-2 py-1 rounded-full text-xs font-medium
{% if reminder.status.value == 'completed' %}bg-green-100 text-green-700
{% elif reminder.status.value == 'in_progress' %}bg-blue-100 text-blue-700
{% elif reminder.status.value == 'pending' %}bg-yellow-100 text-yellow-700
{% endif %}">
{{ reminder.status.value }}
</span>
</div>
{% if reminder.description %}
<p class="text-gray-600 text-sm mb-4">{{ reminder.description[:100] }}...</p>
{% endif %}
<div class="flex items-center gap-4 text-sm text-gray-500">
{% if reminder.due_date %}
<span class="flex items-center gap-1">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
</svg>
{{ reminder.due_date.strftime('%Y-%m-%d') }}
</span>
{% endif %}
</div>
<div class="mt-4 pt-4 border-t flex justify-end">
<a href="/reminders/{{ reminder.id }}" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
عرض التفاصيل ←
</a>
</div>
</div>
