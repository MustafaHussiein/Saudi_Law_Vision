<!-- Ticket Card Component -->
<div class="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition">
<div class="flex items-start justify-between mb-3">
<div class="flex-1">
<p class="text-xs text-gray-500 mb-1">#{{ ticket.ticket_number }}</p>
<h3 class="text-lg font-semibold text-gray-900">{{ ticket.title }}</h3>
</div>
<span class="px-3 py-1 rounded-full text-xs font-medium
{% if ticket.status.value == 'open' %}bg-yellow-100 text-yellow-700
{% elif ticket.status.value == 'in_progress' %}bg-blue-100 text-blue-700
{% elif ticket.status.value == 'resolved' %}bg-green-100 text-green-700
{% elif ticket.status.value == 'closed' %}bg-gray-100 text-gray-700
{% endif %}">
{{ ticket.status.value }}
</span>
</div>
{% if ticket.description %}
<p class="text-gray-600 text-sm mb-4">{{ ticket.description[:100] }}...</p>
{% endif %}
<div class="flex items-center justify-between text-sm text-gray-500">
<span>{{ ticket.ticket_type.value }}</span>
<span>{{ ticket.created_at.strftime('%Y-%m-%d') }}</span>
</div>
<div class="mt-4 pt-4 border-t flex justify-end">
<a href="/tickets/{{ ticket.id }}" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
عرض التفاصيل ←
</a>
</div>
</div>
