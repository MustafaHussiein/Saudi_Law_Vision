<!-- Pagination Component -->
<div class="flex items-center justify-between border-t border-gray-200 bg-white px-4 py-3 sm:px-6 rounded-b-xl">
<div class="flex flex-1 justify-between sm:hidden">
<a href="?page={{ page - 1 if page > 1 else 1 }}" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
السابق
</a>
<a href="?page={{ page + 1 if page < total_pages else total_pages }}" class="mr-3 px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
التالي
</a>
</div>
<div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
<div><p class="text-sm text-gray-700">
عرض <span class="font-medium">{{ start }}</span> إلى <span class="font-medium">{{ end }}</span> من 
<span class="font-medium">{{ total }}</span> نتيجة
</p></div>
<div><nav class="flex gap-2">
{% for p in range(1, total_pages + 1) %}
{% if p == page %}
<span class="px-4 py-2 border border-blue-600 bg-blue-600 text-white rounded-md text-sm font-medium">{{ p }}</span>
{% else %}
<a href="?page={{ p }}" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">{{ p }}</a>
{% endif %}
{% endfor %}
</nav></div>
</div>
</div>
