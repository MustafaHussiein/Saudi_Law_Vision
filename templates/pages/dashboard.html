{% extends "base.html" %}
{% block title %}لوحة التحكم - Riada Law{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">لوحة التحكم</h1>
            <p class="text-gray-600 mt-1">نظرة عامة على النشاط</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="stats-container"></div>
</div>

<script>
async function loadStats() {
    const token = localStorage.getItem('access_token');
    if (!token) return;

    try {
        // Get current user first
        const userResponse = await fetch('/api/v1/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const currentUser = await userResponse.json();
        
        // Get dashboard stats
        const statsResponse = await fetch('/api/v1/dashboard', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const stats = await statsResponse.json();

        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        
        // Card 1: معلقة (everyone sees)
        container.innerHTML += 
            '<a href="/tickets?status=pending" class="block bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition">' +
                '<div class="flex items-center justify-between">' +
                    '<div>' +
                        '<p class="text-gray-600 text-sm font-medium">معلقة</p>' +
                        '<p class="text-3xl font-bold text-gray-900 mt-2">' + (stats.pending || 0) + '</p>' +
                    '</div>' +
                    '<div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center">' +
                        '<svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>' +
                        '</svg>' +
                    '</div>' +
                '</div>' +
            '</a>';
        
        // Card 2: قيد المعالجة (everyone sees)
        container.innerHTML += 
            '<a href="/tickets?status=in_progress" class="block bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition">' +
                '<div class="flex items-center justify-between">' +
                    '<div>' +
                        '<p class="text-gray-600 text-sm font-medium">قيد المعالجة</p>' +
                        '<p class="text-3xl font-bold text-gray-900 mt-2">' + (stats.in_progress || 0) + '</p>' +
                    '</div>' +
                    '<div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center">' +
                        '<svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>' +
                        '</svg>' +
                    '</div>' +
                '</div>' +
            '</a>';
        
        // Card 3: إجمالي العملاء (STAFF ONLY - hide for clients)
        if (currentUser.role !== 'client') {
            container.innerHTML += 
                '<a href="/users?role=client" class="block bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition">' +
                    '<div class="flex items-center justify-between">' +
                        '<div>' +
                            '<p class="text-gray-600 text-sm font-medium">إجمالي العملاء</p>' +
                            '<p class="text-3xl font-bold text-gray-900 mt-2">' + (stats.total_clients || 0) + '</p>' +
                        '</div>' +
                        '<div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">' +
                            '<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                                '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>' +
                            '</svg>' +
                        '</div>' +
                    '</div>' +
                '</a>';
        }
        
        // Card 4: تذاكر مفتوحة (everyone sees)
        container.innerHTML += 
            '<a href="/tickets?status=open" class="block bg-white rounded-lg shadow-sm p-6 hover:shadow-md transition">' +
                '<div class="flex items-center justify-between">' +
                    '<div>' +
                        '<p class="text-gray-600 text-sm font-medium">تذاكر مفتوحة</p>' +
                        '<p class="text-3xl font-bold text-gray-900 mt-2">' + (stats.waiting || 0) + '</p>' +
                    '</div>' +
                    '<div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">' +
                        '<svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                            '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>' +
                        '</svg>' +
                    '</div>' +
                '</div>' +
            '</a>';
        
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

loadStats();
</script>
{% endblock %}
