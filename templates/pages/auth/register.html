<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Riada Law</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">إنشاء حساب جديد</h1>
            <p class="text-gray-600 mt-2">انضم إلى Riada Law</p>
        </div>
        
        <!-- Success message -->
        <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-4">
            <p id="success-text"></p>
        </div>
        
        <!-- Error message -->
        <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4">
            <p id="error-text"></p>
        </div>
        
        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">الاسم الكامل</label>
                <input 
                    type="text" 
                    name="full_name" 
                    id="full_name"
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="أحمد محمد"
                >
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">البريد الإلكتروني</label>
                <input 
                    type="email" 
                    name="email" 
                    id="email"
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="example@email.com"
                >
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">كلمة المرور</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password"
                    required 
                    minlength="6"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="••••••••"
                >
                <p class="text-xs text-gray-500 mt-1">يجب أن تكون 6 أحرف على الأقل</p>
            </div>
            
            <button 
                type="submit"
                id="register-button"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200"
            >
                إنشاء حساب
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                لديك حساب بالفعل؟
                <a href="/login" class="text-blue-600 hover:text-blue-700 font-semibold">تسجيل الدخول</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const successDiv = document.getElementById('success-message');
            const successText = document.getElementById('success-text');
            const button = document.getElementById('register-button');
            
            // Hide messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            // Disable button
            button.disabled = true;
            button.textContent = 'جاري إنشاء الحساب...';
            
            // Get form data as JSON
            const userData = {
                email: document.getElementById('email').value,
                full_name: document.getElementById('full_name').value,
                password: document.getElementById('password').value
            };
            
            try {
                // Send register request
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Registration successful
                    successText.textContent = 'تم إنشاء الحساب بنجاح! جاري تحويلك لتسجيل الدخول...';
                    successDiv.classList.remove('hidden');
                    
                    button.textContent = '✓ تم إنشاء الحساب';
                    button.classList.remove('bg-blue-600');
                    button.classList.add('bg-green-600');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    // Registration failed
                    if (data.detail) {
                        if (typeof data.detail === 'string') {
                            errorText.textContent = data.detail;
                        } else if (Array.isArray(data.detail)) {
                            errorText.textContent = 'خطأ في البيانات المدخلة. يرجى التحقق من جميع الحقول.';
                        } else {
                            errorText.textContent = 'حدث خطأ أثناء إنشاء الحساب';
                        }
                    } else {
                        errorText.textContent = 'حدث خطأ أثناء إنشاء الحساب';
                    }
                    errorDiv.classList.remove('hidden');
                    
                    button.disabled = false;
                    button.textContent = 'إنشاء حساب';
                }
            } catch (error) {
                errorText.textContent = 'حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.';
                errorDiv.classList.remove('hidden');
                
                button.disabled = false;
                button.textContent = 'إنشاء حساب';
            }
        });
    </script>
</body>
</html>
