{% extends "base.html" %}
{% block title %}{{ 'تعديل' if reminder else 'إضافة' }} تذكير{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
<h1 class="text-3xl font-bold">{{ 'تعديل' if reminder else 'إضافة' }} تذكير</h1>
<form id="reminder-form" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
<div><label class="block text-sm font-medium mb-2">العنوان *</label>
<input type="text" name="title" required class="w-full px-4 py-2 border rounded-lg"></div>
<div><label class="block text-sm font-medium mb-2">الوصف</label>
<textarea name="description" rows="4" class="w-full px-4 py-2 border rounded-lg"></textarea></div>
<div class="grid grid-cols-2 gap-4">
<div><label class="block text-sm font-medium mb-2">الأولوية</label>
<select name="priority" class="w-full px-4 py-2 border rounded-lg">
<option value="normal">عادية</option><option value="high">عالية</option><option value="urgent">عاجلة</option></select></div>
<div><label class="block text-sm font-medium mb-2">تاريخ الاستحقاق</label>
<input type="datetime-local" name="due_date" class="w-full px-4 py-2 border rounded-lg"></div></div>
<div class="flex gap-3">
<button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg">حفظ</button>
<a href="/reminders" class="px-6 py-2 bg-gray-200 rounded-lg">إلغاء</a></div></form></div>
<script>
document.getElementById('reminder-form').addEventListener('submit', async (e) => {
e.preventDefault();
const data = Object.fromEntries(new FormData(e.target));
const res = await fetch('/api/v1/reminders', {method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('access_token')}, body: JSON.stringify(data)});
if (res.ok) window.location.href = '/reminders';
});
</script>
{% endblock %}
