{% extends "base.html" %}

{% block title %}التذاكر - Riada Law{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">إدارة التذاكر</h1>
            <p class="text-gray-600 mt-1">إدارة وتتبع جميع المهام والتنبيهات</p>
        </div>
        <a href="/reminders/create" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            + تذكير جديد
        </a>
    </div>

    <div id="loading" class="bg-white rounded-lg shadow-sm p-8 text-center">
        <p class="text-gray-600">جاري التحميل...</p>
    </div>

    <div id="reminders-container" class="bg-white rounded-lg shadow-sm" style="display:none;">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">العنوان</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الحالة</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الأولوية</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">تاريخ الاستحقاق</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="reminders-body" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <div id="empty-state" class="bg-white rounded-lg shadow-sm p-12 text-center" style="display:none;">
        <h3 class="text-lg font-medium text-gray-900">لا توجد تذاكر</h3>
        <p class="mt-2 text-gray-500">ابدأ بإنشاء تذكير جديد</p>
        <a href="/reminders/create" class="mt-4 inline-block px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            + تذكير جديد
        </a>
    </div>
</div>

<script>
async function loadReminders() {
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    try {
        const response = await fetch('/api/v1/reminders', {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (response.status === 401) {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
            return;
        }

        const data = await response.json();
        const reminders = data.reminders || [];

        document.getElementById('loading').style.display = 'none';

        if (reminders.length === 0) {
            document.getElementById('empty-state').style.display = 'block';
        } else {
            document.getElementById('reminders-container').style.display = 'block';
            renderReminders(reminders);
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerHTML = '<p class="text-red-600">حدث خطأ</p>';
    }
}

function getStatusColor(status) {
    const val = status.value || status;
    if (val === 'pending') return 'bg-yellow-100 text-yellow-800';
    if (val === 'completed') return 'bg-green-100 text-green-800';
    return 'bg-blue-100 text-blue-800';
}

function getPriorityColor(priority) {
    const val = priority.value || priority;
    if (val === 'urgent') return 'text-red-600 font-bold';
    if (val === 'high') return 'text-orange-600';
    return 'text-gray-600';
}

function renderReminders(reminders) {
    const tbody = document.getElementById('reminders-body');
    tbody.innerHTML = reminders.map(r => `
        <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm text-gray-900">${r.title}</td>
            <td class="px-6 py-4 whitespace-nowrap">
                <span class="px-2 py-1 text-xs rounded-full ${getStatusColor(r.status)}">
                    ${r.status.value || r.status}
                </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm ${getPriorityColor(r.priority)}">
                ${r.priority.value || r.priority}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                ${r.due_date ? new Date(r.due_date).toLocaleDateString('ar-SA') : '-'}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm">
                <a href="/reminders/${r.id}" class="text-blue-600 hover:text-blue-900">عرض</a>
            </td>
        </tr>
    `).join('');
}

loadReminders();
</script>
{% endblock %}
