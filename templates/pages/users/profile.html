{% extends "base.html" %}
{% block title %}الملف الشخصي{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <h1 class="text-3xl font-bold">الملف الشخصي</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="space-y-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 text-center">
                <div id="avatar-circle" class="h-24 w-24 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-3xl mx-auto mb-4 border-2 border-blue-50">
                    ?
                </div>
                <h2 id="side-name" class="text-xl font-bold text-gray-900">جاري التحميل...</h2>
                <p id="side-role" class="text-sm text-blue-600 font-medium bg-blue-50 px-3 py-1 rounded-full inline-block mt-2 capitalize"></p>
                <div class="mt-6 pt-6 border-t text-right space-y-3">
                    <p class="text-xs text-gray-500">الحالة: <span id="side-status" class="font-bold text-green-600">نشط</span></p>
                    <p class="text-xs text-gray-500">تاريخ الانضمام: <span id="side-joined" class="font-bold"></span></p>
                </div>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4">المعلومات الأساسية</h3>
                <form id="profile-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">الاسم الكامل (EN)</label>
                            <input type="text" name="full_name" id="f-name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">الاسم الكامل (AR)</label>
                            <input type="text" name="full_name_ar" id="f-name-ar" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">البريد الإلكتروني (لا يمكن تغييره)</label>
                        <input type="email" id="f-email" disabled class="w-full px-4 py-2 border rounded-lg bg-gray-50 text-gray-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">رقم الهاتف</label>
                        <input type="tel" name="phone" id="f-phone" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">تحديث البيانات</button>
                </form>
            </div>

            <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 text-red-600">تغيير كلمة المرور</h3>
                <form id="password-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">كلمة المرور الجديدة</label>
                        <input type="password" name="new_password" required minlength="6" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    </div>
                    <button type="submit" class="px-6 py-2 bg-gray-800 text-white rounded-lg hover:bg-black transition">تحديث كلمة المرور</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let currentUserId = null;
const token = localStorage.getItem('access_token');

async function loadProfile() {
    try {
        const response = await fetch('/api/v1/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error("Unauthorized");
        
        const user = await response.json();
        currentUserId = user.id;

        // UI Updates
        document.getElementById('side-name').textContent = user.full_name_ar || user.full_name;
        document.getElementById('side-role').textContent = user.role;
        document.getElementById('side-joined').textContent = user.created_at ? user.created_at.split(' ')[0] : '-';
        document.getElementById('avatar-circle').textContent = (user.full_name_ar || user.full_name).charAt(0);
        
        // Form Fill
        document.getElementById('f-name').value = user.full_name;
        document.getElementById('f-name-ar').value = user.full_name_ar || '';
        document.getElementById('f-email').value = user.email;
        document.getElementById('f-phone').value = user.phone || '';

    } catch (err) {
        window.location.href = '/login';
    }
}

// Update Information
document.getElementById('profile-form').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);

    const res = await fetch(`/api/v1/users/${currentUserId}`, {
        method: 'PUT',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        alert('تم تحديث الملف الشخصي بنجاح');
        loadProfile();
    } else {
        alert('حدث خطأ أثناء التحديث');
    }
};

// Simple Password Update (Requires specific API logic if separate)
document.getElementById('password-form').onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = { password: formData.get('new_password') };

    const res = await fetch(`/api/v1/users/${currentUserId}`, {
        method: 'PUT',
        headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        alert('تم تغيير كلمة المرور');
        e.target.reset();
    }
};

loadProfile();
</script>
{% endblock %}
