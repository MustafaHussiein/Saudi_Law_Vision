{% extends "base.html" %}
{% block title %}تفاصيل المستخدم{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold" id="user-title">تفاصيل المستخدم</h1>
        <div class="flex gap-2">
            <a id="edit-user-btn" href="#" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                تعديل البيانات
            </a>
            
            <button onclick="deleteUser()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg hover:bg-red-100 transition">
                حذف
            </button>
        </div>
    </div>

    <div id="user-card" class="bg-white rounded-xl shadow-sm border p-6 space-y-6">
        <div class="grid grid-cols-2 gap-6">
            <div>
                <label class="text-sm text-gray-500">الاسم الكامل</label>
                <p id="u-fullname" class="font-bold text-lg">-</p>
            </div>
            <div>
                <label class="text-sm text-gray-500">الاسم بالعربي</label>
                <p id="u-fullname-ar" class="font-bold text-lg">-</p>
            </div>
            <div>
                <label class="text-sm text-gray-500">البريد الإلكتروني</label>
                <p id="u-email" class="font-medium">-</p>
            </div>
            <div>
                <label class="text-sm text-gray-500">رقم الهاتف</label>
                <p id="u-phone" class="font-medium">-</p>
            </div>
            <div>
                <label class="text-sm text-gray-500">الدور</label>
                <span id="u-role" class="px-3 py-1 bg-blue-50 text-blue-700 rounded-full text-sm font-bold capitalize">-</span>
            </div>
            <div>
                <label class="text-sm text-gray-500">الحالة</label>
                <span id="u-status" class="px-3 py-1 rounded-full text-sm font-bold">-</span>
            </div>
        </div>
    </div>
</div>

<script>
// Grab ID from URL: /users/4 -> 4
const userId = window.location.pathname.split('/').pop();

async function loadUser() {
    const token = localStorage.getItem('access_token');
    try {
        const response = await fetch(`/api/v1/users/${userId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const u = await response.json();

        // Update Text
        document.getElementById('u-fullname').textContent = u.full_name;
        document.getElementById('u-fullname-ar').textContent = u.full_name_ar || 'غير محدد';
        document.getElementById('u-email').textContent = u.email;
        document.getElementById('u-phone').textContent = u.phone || '-';
        document.getElementById('u-role').textContent = u.role;
        
        const statusEl = document.getElementById('u-status');
        statusEl.textContent = u.is_active ? 'نشط' : 'معطل';
        statusEl.className = u.is_active ? 'px-3 py-1 bg-green-50 text-green-700 rounded-full text-sm font-bold' : 'px-3 py-1 bg-red-50 text-red-700 rounded-full text-sm font-bold';

        // UPDATE EDIT BUTTON LINK
        document.getElementById('edit-user-btn').href = `/users/${userId}/edit`;

    } catch (error) {
        console.error("Error loading user:", error);
    }
}

async function deleteUser() {
    if (!confirm("هل أنت متأكد من حذف هذا المستخدم؟")) return;
    const token = localStorage.getItem('access_token');
    const res = await fetch(`/api/v1/users/${userId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) window.location.href = '/users';
}

loadUser();
</script>
{% endblock %}
