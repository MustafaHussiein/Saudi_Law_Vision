{% extends "base.html" %}
{% block title %}التذاكر - Riada Law{% endblock %}
{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold text-gray-900">التذاكر والطلبات</h1>
        <a href="/tickets/create" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            + تذكرة جديدة
        </a>
    </div>

    <!-- Filter tabs for ticket types -->
    <div class="bg-white rounded-lg shadow-sm p-2">
        <div class="flex gap-2 flex-wrap">
            <button onclick="filterByType(null)" 
                    class="filter-tab px-4 py-2 rounded hover:bg-gray-100" 
                    data-type="all">
                الكل
            </button>
            <button onclick="filterByType('inquiry')" 
                    class="filter-tab px-4 py-2 rounded hover:bg-gray-100" 
                    data-type="inquiry">
                استفسار
            </button>
            <button onclick="filterByType('support')" 
                    class="filter-tab px-4 py-2 rounded hover:bg-gray-100" 
                    data-type="support">
                دعم فني
            </button>
            <button onclick="filterByType('complaint')" 
                    class="filter-tab px-4 py-2 rounded hover:bg-gray-100" 
                    data-type="complaint">
                شكوى
            </button>
            <button onclick="filterByType('request')" 
                    class="filter-tab px-4 py-2 rounded hover:bg-gray-100" 
                    data-type="request">
                طلب
            </button>
        </div>
    </div>

    <div id="loading" class="bg-white rounded-lg shadow-sm p-8 text-center">
        <p>جاري التحميل...</p>
    </div>

    <div id="tickets-container" class="bg-white rounded-lg shadow-sm" style="display:none;">
        <table class="w-full">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">رقم التذكرة</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">العنوان</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">النوع</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">الحالة</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">الأولوية</th>
                    <th class="px-6 py-3 text-right text-xs font-medium text-gray-500">إجراءات</th>
                </tr>
            </thead>
            <tbody id="tickets-body" class="divide-y"></tbody>
        </table>
    </div>

    <div id="empty-state" class="bg-white rounded-lg shadow-sm p-12 text-center" style="display:none;">
        <h3 class="text-lg font-medium text-gray-900">لا توجد تذاكر</h3>
        <p id="empty-message" class="mt-2 text-gray-500">ابدأ بإنشاء تذكرة جديدة</p>
    </div>
</div>

<script>
let currentTypeFilter = null;

function getStatusFilter() {
    const params = new URLSearchParams(window.location.search);
    return params.get('status');
}

function filterByType(type) {
    currentTypeFilter = type;
    
    // Update active tab
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('bg-blue-100', 'text-blue-700', 'font-semibold');
        if ((type === null && tab.dataset.type === 'all') || tab.dataset.type === type) {
            tab.classList.add('bg-blue-100', 'text-blue-700', 'font-semibold');
        }
    });
    
    loadTickets();
}

async function loadTickets() {
    const token = localStorage.getItem('access_token');
    if (!token) { window.location.href = '/login'; return; }

    const statusFilter = getStatusFilter();
    let url = '/api/v1/tickets?';
    if (statusFilter) url += 'status_filter=' + statusFilter + '&';
    if (currentTypeFilter) url += 'type_filter=' + currentTypeFilter;

    try {
        const response = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (response.status === 401) { window.location.href = '/login'; return; }

        const data = await response.json();
        const tickets = data.tickets || [];

        document.getElementById('loading').style.display = 'none';

        if (tickets.length === 0) {
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('tickets-container').style.display = 'none';
            let msg = 'لا توجد تذاكر';
            if (statusFilter === 'pending') msg = 'لا توجد تذاكر معلقة';
            if (statusFilter === 'in_progress') msg = 'لا توجد تذاكر قيد المعالجة';
            if (statusFilter === 'open') msg = 'لا توجد تذاكر مفتوحة';
            if (currentTypeFilter === 'inquiry') msg = 'لا توجد استفسارات';
            if (currentTypeFilter === 'support') msg = 'لا توجد طلبات دعم فني';
            if (currentTypeFilter === 'complaint') msg = 'لا توجد شكاوى';
            if (currentTypeFilter === 'request') msg = 'لا توجد طلبات';
            document.getElementById('empty-message').textContent = msg;
        } else {
            document.getElementById('tickets-container').style.display = 'block';
            document.getElementById('empty-state').style.display = 'none';
            renderTickets(tickets);
        }
    } catch (error) {
        document.getElementById('loading').innerHTML = '<p class="text-red-600">خطأ</p>';
    }
}

function getStatusColor(status) {
    const s = (status && status.value || status || 'open').toLowerCase();
    if (s === 'open') return 'bg-green-100 text-green-800';
    if (s === 'in_progress') return 'bg-blue-100 text-blue-800';
    if (s === 'pending') return 'bg-yellow-100 text-yellow-800';
    if (s === 'closed') return 'bg-gray-100 text-gray-800';
    return 'bg-purple-100 text-purple-800';
}

function getStatusText(status) {
    const s = (status && status.value || status || 'open').toLowerCase();
    const map = {
        'open': 'مفتوحة', 'in_progress': 'قيد المعالجة',
        'pending': 'معلقة', 'closed': 'مغلقة', 'resolved': 'محلولة'
    };
    return map[s] || s;
}

function getTypeText(type) {
    const t = (type && type.value || type || '').toLowerCase();
    const map = {
        'inquiry': 'استفسار',
        'support': 'دعم فني',
        'complaint': 'شكوى',
        'request': 'طلب'
    };
    return map[t] || t;
}

function renderTickets(tickets) {
    document.getElementById('tickets-body').innerHTML = tickets.map(t =>
        '<tr class="hover:bg-gray-50">' +
            '<td class="px-6 py-4 text-sm">' + (t.ticket_number || 'N/A') + '</td>' +
            '<td class="px-6 py-4 text-sm">' + t.title + '</td>' +
            '<td class="px-6 py-4 text-sm text-gray-600">' + getTypeText(t.ticket_type) + '</td>' +
            '<td class="px-6 py-4"><span class="px-2 py-1 text-xs rounded-full ' + getStatusColor(t.status) + '">' +
                getStatusText(t.status) + '</span></td>' +
            '<td class="px-6 py-4 text-sm">' + (t.priority || 'normal') + '</td>' +
            '<td class="px-6 py-4 text-sm"><a href="/tickets/' + t.id + '" class="text-blue-600 hover:underline">عرض</a></td>' +
        '</tr>'
    ).join('');
}

// Initialize - set "الكل" as active
document.querySelector('[data-type="all"]').classList.add('bg-blue-100', 'text-blue-700', 'font-semibold');
loadTickets();
</script>
{% endblock %}
